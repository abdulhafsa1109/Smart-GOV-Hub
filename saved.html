<!DOCTYPE html>
<html>
<head>
  <title>Saved Schemes</title>
  <!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
<style>
    html, body {
  height: 100%;
}

body {
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
}
</style>
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
      <img src="logo.jpeg" width="40" height="40" class="me-2 rounded-circle">
      <span class="fs-5">SmartGovHub</span>
    </a>
  </div>
</nav>
<div class="container py-5">
  <h2 class="text-center mb-4">Saved Schemes</h2>

  <div class="row g-4" id="savedList"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, getDocs, query, where, deleteDoc, doc } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyADvcSURAT597F0IBqKydNZWmWSp1wumr8",
    authDomain: "smartgovhub.firebaseapp.com",
    projectId: "smartgovhub",
    storageBucket: "smartgovhub.appspot.com",
    messagingSenderId: "272299843116",
    appId: "1:272299843116:web:331d652a7e0374d5707b89"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    const container = document.getElementById("savedList");

    if (!user) {
      container.innerHTML = "<p class='text-center'>Please login first</p>";
      return;
    }

    const q = query(
      collection(db, "savedSchemes"),
      where("userId", "==", user.uid)
    );

    const snapshot = await getDocs(q);

    container.innerHTML = "";

    // 🔥 FIXED VARIABLE NAME HERE
    snapshot.forEach(documentSnap => {
      const data = documentSnap.data();
      const id = documentSnap.id;

      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card shadow h-100 text-center p-3">
          <h5>${data.name}</h5>
          <p>${data.description || "No description available"}</p>

          <a href="${data.applyLink}" target="_blank"
             class="btn btn-warning btn-sm mt-2">
             Apply Now
          </a>

          <button class="btn btn-danger btn-sm mt-2"
            onclick="removeItem('${id}', this)">
            Unsave
          </button>
        </div>
      `;

      container.appendChild(col);
    });
  });

  // 🔥 REMOVE FUNCTION
  window.removeItem = async function(id, btn) {
    if (!confirm("Remove this saved scheme?")) return;

    try {
      await deleteDoc(doc(db, "savedSchemes", id));

      // remove card from UI
      const card = btn.closest(".col-md-4");
      if (card) card.remove();

    } catch (error) {
      console.error(error);
      alert("Error removing item");
    }
  };
</script>
<footer class="bg-primary text-white text-center py-3 mt-5 shadow-sm">
  <div class="container">
    <small>© 2026 Smart Gov Hub</small>
  </div>
</footer>
</body>
</html>
