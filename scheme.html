<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheme Results | Smart Gov Hub</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- Custom CSS (optional) -->
  <link rel="stylesheet" href="style.css">
  <style>
    #chatbot-icon {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}

#chatbot {
  position: fixed;
  bottom: 70px;
  right: 20px;
  width: 280px;
  height: 350px;
  background: #fff;
  border: 1px solid #ccc;
  display: none;          /* stays hidden initially */
  flex-direction: column;
}


#chat-header {
  background: #2c7be5;
  color: white;
  padding: 10px;
  font-weight: bold;
}

#chat-body {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

#userInput {
  width: 75%;
}

  </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
      <img src="logo.jpeg" width="40" height="40" class="me-2 rounded-circle">
      <span class="fs-5">SmartGovHub</span>
    </a>
  </div>
</nav>

<!-- Page Header -->
<section class="py-4 bg-white shadow-sm">
  <div class="container">
    <h2 class="fw-bold">Government Schemes</h2>
    <p class="text-muted mb-0">
      Search and filter schemes based on your eligibility
    </p>
  </div>
</section>

<!-- Filters Section -->
<section class="py-4">
  <div class="container">
    <div class="row g-3">

      <!-- Search -->
      <div class="col-md-4">
        <input 
          type="text" 
          id="searchBox" 
          class="form-control"
          placeholder="Search scheme name..."
        >
      </div>

      <!-- Category Filter -->
      <div class="col-md-4">
        <select id="categoryFilter" class="form-select">
          <option value="">All Categories</option>
          <option value="Agriculture">Agriculture</option>
          <option value="Education">Education</option>
          <option value="Health">Health</option>
          <option value="Employment">Employment</option>
          <option value="Women Welfare">Women Welfare</option>
          <option value="Finance">Finance</option>
        </select>
      </div>

      <!-- Gender Filter -->
      <div class="col-md-4">
        <select id="genderFilter" class="form-select">
          <option value="">All Genders</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="All">All</option>
        </select>
      </div>

    </div>
  </div>
</section>

<!-- Scheme Results -->
<section class="pb-5">
  <div class="container">
    <div class="row" id="schemeResults">
      <!-- Schemes will load here from Firestore -->
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-primary text-white text-center py-3">
  <small>© 2026 Smart Gov Hub | Designed by Maahi</small>
</footer>
<!-- Chatbot Icon --------------------------------->
<div id="chatbot-icon" onclick="toggleChat()">💬</div>

<!-- Chatbot Box 
<div id="chatbot">
  <div id="chat-header">Gov Schemes Assistant</div>
  <div id="chat-body"></div>
  <input id="userInput" placeholder="Ask about schemes..." />
  <button onclick="sendMessage()">Send</button>
</div>-->
<!--changed one-->
<!-- Bootstrap JS --------------------------------------->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Main JS (Firebase + Search + Filters) -->
<script type="module" src="app.js"></script>
<script type="module" src="js/chatbot.js"></script>

</body>
</html>
