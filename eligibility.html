<!DOCTYPE html>
<html>
<head>
<title>Eligibility Check</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
<style>
    html, body {
  height: 100%;
}

body {
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
}
</style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">

    <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
      <img src="logo.jpeg" width="40" height="40" class="me-2 rounded-circle">
      <span class="fs-5">SmartGovHub</span>

  </div>
</nav>

<!--MAIN CONTENT -->
<div class="container mt-5">

  <h2>Eligibility Checker</h2>

  <div id="schemeTitle" class="mb-3"></div>

  <input id="userAge" class="form-control mb-2" placeholder="Enter Age">
  <input id="userIncome" class="form-control mb-2" placeholder="Enter Income">
  <input id="userState" class="form-control mb-2" placeholder="Enter State">

  <button id="checkBtn" class="btn btn-success mt-2">
    Check Eligibility
  </button>

  <div id="resultBox" class="mt-3"></div>

</div>

<script type="module" src="./app.js"></script>

  </div>
