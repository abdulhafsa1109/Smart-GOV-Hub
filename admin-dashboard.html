<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | SmartGov Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }
    .card {
      border-radius: 15px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
  <span class="navbar-brand">SmartGov Hub - Admin</span>
  <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
</nav>

<div class="container mt-5">

  <h3 class="mb-4">Dashboard Overview</h3>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card shadow p-4 text-center">
        <h5>Total Requests</h5>
        <h2 id="totalRequests">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow p-4 text-center">
        <h5>Pending Requests</h5>
        <h2 id="pendingRequests">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow p-4 text-center">
        <h5>Approved Requests</h5>
        <h2 id="approvedRequests">0</h2>
      </div>
    </div>

  </div>

  <hr class="my-5">

  <h3 class="mb-4">Manage Requests</h3>

  <div class="table-responsive">
    <table class="table table-bordered table-striped shadow">
      <thead class="table-dark">
        <tr>
          <th>User Name</th>
          <th>Category</th>
          <th>Scheme</th>
          <th>Type</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="requestsTable">
      </tbody>
    </table>
  </div>

</div>
<hr class="my-5">

<h3 class="mb-4">Manage Schemes</h3>

<div class="card shadow p-4 mb-4">
  <div class="row g-3">

    <div class="col-md-6">
      <input type="text" id="name" class="form-control" placeholder="Scheme Name">
    </div>

    <div class="col-md-6">
      <input type="text" id="category" class="form-control" placeholder="Category">
    </div>

    <div class="col-md-6">
      <input type="text" id="state" class="form-control" placeholder="State">
    </div>

    <div class="col-md-6">
      <input type="text" id="schemeType" class="form-control" placeholder="Scheme Type">
    </div>

    <div class="col-md-4">
      <input type="number" id="ageMin" class="form-control" placeholder="Min Age">
    </div>

    <div class="col-md-4">
      <input type="number" id="ageMax" class="form-control" placeholder="Max Age">
    </div>

    <div class="col-md-4">
      <input type="number" id="incomeLimit" class="form-control" placeholder="Income Limit">
    </div>

    <div class="col-md-6">
      <input type="text" id="gender" class="form-control" placeholder="Gender (All/Male/Female)">
    </div>

    <div class="col-md-6">
      <input type="number" id="launchYear" class="form-control" placeholder="Launch Year">
    </div>

    <div class="col-md-12">
      <input type="text" id="ministry" class="form-control" placeholder="Ministry">
    </div>

    <div class="col-md-12">
      <input type="text" id="applyLink" class="form-control" placeholder="Apply Link">
    </div>

    <div class="col-md-12">
      <textarea id="description" class="form-control" placeholder="Description"></textarea>
    </div>

    <div class="col-md-12">
      <textarea id="benefits" class="form-control" placeholder="Benefits"></textarea>
    </div>

    <div class="col-md-12">
      <textarea id="eligibility" class="form-control" placeholder="Eligibility"></textarea>
    </div>

    <div class="col-md-12">
      <input type="text" id="documentsRequired" class="form-control"
        placeholder="Documents (comma separated)">
    </div>

    <div class="col-md-6">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="isActive" checked>
        <label class="form-check-label">Is Active</label>
      </div>
    </div>

    <div class="col-md-6">
      <button class="btn btn-primary w-100" onclick="saveScheme()">Save Scheme</button>
    </div>

  </div>
</div>

<table class="table table-bordered table-striped shadow">
  <thead class="table-dark">
    <tr>
      <th>Name</th>
      <th>State</th>
      <th>Category</th>
      <th>Active</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="schemesTable"></tbody>
</table>


<script type="module" src="admin-dashboard.js"></script>

</body>
</html>
