<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Smart Gov Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #0d6efd, #5a9bff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

<div class="login-card">
  <h3 class="text-center fw-bold mb-4">
    <i class="bi bi-shield-lock"></i> Login
  </h3>

  <form id="loginForm">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" required>
    </div>

    <button class="btn btn-primary w-100">Login</button>
  </form>

  <p class="text-center mt-3">
    Don’t have an account?
    <a href="signup.html" class="fw-semibold text-decoration-none">Sign Up</a>
  </p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyADvcSURAT597F0IBqKydNZWmWSp1wumr8",
    authDomain: "smartgovhub.firebaseapp.com",
    projectId: "smartgovhub",
    storageBucket: "smartgovhub.appspot.com",
    messagingSenderId: "272299843116",
    appId: "1:272299843116:web:331d652a7e0374d5707b89"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("Login Successful");
        window.location.href = "index.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>

</body>
</html>
